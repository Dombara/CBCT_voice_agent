services:
  - type: web
    name: voice-agent-backend
    runtime: python
    buildCommand: "uv sync --frozen && uv cache prune --ci"
    startCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker backend.main:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: SECRET_KEY
        generateValue: true # Render will generate a random string for you
      - key: ALGORITHM
        value: "HS256"