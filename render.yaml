# Render deployment configuration
# See https://render.com/docs/deploy-to-render for details

# Python web service example
services:
  - type: web
    name: voice-agent
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
